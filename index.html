          }

        {
          "@type": "Organization",
          "@id": "https://detour.ninja/#organization",

          "slogan": "Your AI Agents. Everywhere."

        {
          "@type": "SoftwareApplication",
          "@id": "https://detour.ninja/#softwareapplication",
          "name": "Detour Cloud",
          "applicationCategory": "DeveloperApplication",
          "operatingSystem": "Web, macOS, iOS",
          "description": "Build, deploy, and run autonomous AI agents powered by elizaOS. White-label dashboard with passkey auth and $DTOUR holder tiers.",

          "offers": {
            "@type": "Offer",

        },
        {
          "@type": "BreadcrumbList",
          "@id": "https://detour.ninja/#breadcrumb",
          "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://detour.ninja/" }
          ]
        },
          {
            "@type": "FAQPage",
            "@id": "https://detour.ninja/#faq",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "What is Detour Cloud?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "A cross-platform AI agent runtime. Build autonomous agents on the open elizaOS framework, deploy them to web, macOS (Swoosh), and iPhone, and access them from anywhere. No infrastructure to manage."
                }
              },
              {
                "@type": "Question",
                "name": "What kind of agents can I build?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Chat and support agents, coding and dev assistants, design and creative agents, workflow automation pipelines, blockchain and social media bots, and custom toolchains via MCP plugins. The elizaOS ecosystem has 100+ plugins."
                }
              },
              {
                "@type": "Question",
                "name": "Do I need $DTOUR to use Detour Cloud?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "No. A free tier with monthly compute credits is available — no crypto wallet required. $DTOUR is optional: holding 1M+ unlocks Scout tier perks like discounted coding sandbox rates."
                }
              },
              {
                "@type": "Question",
                "name": "How does authentication work?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Detour Cloud uses WebAuthn passkeys (Face ID, Touch ID, device PIN) as the primary sign-in method. Solana wallet SIWS is available as an optional secondary method for $DTOUR holders. No passwords needed."
                }
              },
              {
                "@type": "Question",
                "name": "Where is my data stored?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Self-hosted Convex (PostgreSQL) on DigitalOcean in Ashburn, Virginia, USA. Encrypted in transit (TLS) and at rest. We never train on or share your agent data."
                }
              },
              {
                "@type": "Question",
                "name": "What platforms are supported?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Web dashboard, macOS native app (Swoosh) with menu bar agent and local MLX inference, iPhone companion app, self-hosted pairing mode, and REST API. Discord, Telegram, and Twitter/X bot connectors."
                }
              },
              {
                "@type": "Question",
                "name": "Is there a desktop app?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes — Swoosh, the native macOS runtime. Always-on AI in your menu bar, full agent control, plus local MLX inference on Apple Silicon for private, zero-cost on-device inference."
                }
              },
              {
                "@type": "Question",
                "name": "How does pricing work?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Free tier with monthly capped compute credits — no credit card needed. $DTOUR holders get discounted rates on coding sandboxes and inference. Usage-based billing via a credit system."
                }
              }
            ]
          }
      ]

    <script>!function(){var t=localStorage.getItem("dtour-theme");if(t==="light"||t==="dark"){document.documentElement.classList.toggle("dark",t==="dark")}else if(window.matchMedia("(prefers-color-scheme: dark)").matches){document.documentElement.classList.add("dark")}}()</script>
